<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HandyMan TLV — Redirecting…</title>
  <meta name="robots" content="noindex" />
  <meta http-equiv="refresh" content="0; url=https://handymantlv.com/" />
  <link rel="canonical" href="https://handymantlv.com/" />
  <script>
    (function () {
      // Strip any path/query/hash and send to the canonical home page.
      // Preserves ?lang= so language-specific links still work.
      var lang = '';
      try {
        var p = new URLSearchParams(location.search);
        if (p.get('lang')) lang = '?lang=' + encodeURIComponent(p.get('lang'));
      } catch (_) {}
      // If we're on a subdomain (en./he./fr./es./m.), redirect to apex
      var target = 'https://handymantlv.com/' + lang;
      location.replace(target);
    })();
  </script>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#08080A;color:#eee;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
    .card{max-width:480px}
    h1{color:#FF5F1F;font-weight:900;font-size:32px;margin:0 0 12px;letter-spacing:-0.02em}
    p{color:#a3a3a3;line-height:1.6;margin:0 0 24px}
    a{display:inline-block;background:linear-gradient(135deg,#FF5F1F,#FF7A3D);color:#fff;text-decoration:none;font-weight:700;padding:12px 24px;border-radius:9999px;box-shadow:0 8px 32px rgba(255,95,31,0.35)}
    a:hover{transform:translateY(-1px)}
  </style>
</head>
<body>
  <div class="card">
    <h1>HandyMan TLV</h1>
    <p>This page has moved. Redirecting you to the home page…</p>
    <a href="https://handymantlv.com/">Go to HandyMan TLV →</a>
  </div>
</body>
</html>
